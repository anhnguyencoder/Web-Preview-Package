<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Preview Package</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <div class="bg-layer" aria-hidden="true"></div>

    <main class="shell">
        <section class="split">
            <div class="left-column">
                <header class="hero panel">
                    <p class="eyebrow">Unity Asset Toolkit</p>
                    <h1>Web Preview Package</h1>
                    <p class="summary">
                        Tự quét package trong mục Assets, tự map link bài tương ứng và mở link.
                    </p>

                    <div id="folderTree" class="folder-tree" role="tree" aria-label="Thư mục Asset"></div>

                    <div class="toolbar">
                        <input id="searchInput" type="search" placeholder="Lọc theo tên package..." autocomplete="off" />
                        <button id="reloadBtn" type="button">Tải lại dữ liệu</button>
                    </div>

                    <div id="metaInfo" class="meta">Đang tải dữ liệu...</div>
                </header>

                <div class="panel list-panel">
                    <h2 id="listTitle">Danh sách package</h2>
                    <div id="packageList" class="package-list"></div>
                </div>
            </div>

            <div class="panel preview-panel">
                <div class="preview-head">
                    <div class="preview-title-group">
                        <h2>Preview bài</h2>
                        <div id="previewSourceTabs" class="preview-source-tabs" aria-label="Preview source">
                            <button class="preview-source-btn active" type="button" data-source="assetstore">Unity Asset Store</button>
                            <button class="preview-source-btn" type="button" data-source="unitycollection">unityassetcollection</button>
                        </div>
                    </div>
                    <div class="preview-actions">
                        <button id="openFileLocation" class="disabled-link" type="button">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            <span>Copy đường dẫn</span>
                        </button>
                        <a id="openExternalLink" class="disabled-link" href="#" target="_blank" rel="noopener noreferrer">
                            <span>Mở tab mới</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
                        </a>
                    </div>
                </div>
                <div class="browser-mockup">
                    <div class="browser-bar">
                        <div class="browser-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <div class="browser-address-bar">
                            <span id="browserUrlText">about:blank</span>
                        </div>
                    </div>
                    <iframe id="previewFrame" title="Package article preview" loading="lazy" src="about:blank"></iframe>
                </div>
                <p id="previewHint" class="meta">Chọn package để xem bài trong khung nhúng.</p>
            </div>
        </section>
    </main>

    <script src="./data/packages.js"></script>
    <script src="./app.js" defer></script>
</body>
</html>
